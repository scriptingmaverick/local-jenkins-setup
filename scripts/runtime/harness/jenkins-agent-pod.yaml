apiVersion: v1
kind: Pod
spec:
  containers:
  - name: jnlp
    image: jenkins/inbound-agent:latest
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    volumeMounts:
    - name: workspace-vol
      mountPath: /workspace
    - name: metrics-vol
      mountPath: /metrics

  - name: model-server
    image: ollama/ollama:latest
    command: ['sh', '-c', 'cat']
    tty: true
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    ports:
    - containerPort: 11434
    volumeMounts:
    - name: workspace-vol
      mountPath: /workspace
    - name: metrics-vol
      mountPath: /metrics

  - name: coding-agent
    image: node:22-slim
    command: ['sh', '-c', 'cat']
    tty: true
    env:
    - name: NPM_CONFIG_PREFIX
      value: "/npm-global"
    - name: IS_SANDBOX
      value: "1"
    resources:
      limits:
        cpu: 2000m
        memory: 6Gi
      requests:
        cpu: 500m
        memory: 1Gi
    volumeMounts:
    - name: npm-global-cache
      mountPath: /npm-global
    - name: workspace-vol
      mountPath: /workspace
    - name: metrics-vol
      mountPath: /metrics

  volumes:
  - name: npm-global-cache
    emptyDir: {}
  - name: workspace-vol
    emptyDir: {}
  - name: metrics-vol
    emptyDir: {}
